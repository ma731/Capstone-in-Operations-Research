name: tests
on: [push, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e .[dev]
      # test_electricitymaps.py needs the licensed (non-committed) EM raw data
      - run: pytest -q --ignore=tests/test_electricitymaps.py
